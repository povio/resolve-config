configs:
  - name: frontend
    destination: ./out/frontend.json
    destinationFormat: json
    values:
      - name: "@"
        templateModule: app.template
        resolve: all
      - name: meta__env
        value: staging

  - name: backend
    destination: ./out/backend.yml
    values:
      - name: service__name
        valueFrom: env:USECASE_SERVICE_NAME
      - name: settings
        objectFrom: env:USECASE_JSON_BLOB

  - name: with_optional_template
    values:
      - name: from_missing
        templateModule: missing.module
        ignoreEmpty: true
      - name: marker
        value: present

  - name: with_context_file
    contextFile: .config/staging.context.fixture.json
    values:
      - name: settings__region
        valueFrom: context:region
      - name: settings__fromCtx
        valueFrom: context:nested.code

  - name: with_context_literal
    context:
      tenantId: tenant-xyz
    values:
      - name: tenant
        valueFrom: context:tenantId

  - name: with_context_file_overridden
    contextFile: .config/staging.context.fixture.json
    context:
      region: override-region
    values:
      - name: settings__region
        valueFrom: context:region

  - name: with_empty_context_file_yml
    contextFile: .config/staging.context.empty.fixture.yml
    context:
      region: from-context
    values:
      - name: settings__region
        valueFrom: context:region

  - name: with_empty_context_file_json
    contextFile: .config/staging.context.empty.fixture.json
    context:
      region: from-context
    values:
      - name: settings__region
        valueFrom: context:region

  - name: with_empty_context_file_env
    contextFile: .config/staging.context.empty.fixture.env
    context:
      region: from-context
    values:
      - name: settings__region
        valueFrom: context:region

  - name: with_empty_template_ignored
    values:
      - name: data
        templatePath: .config/staging.empty.template.yml
        ignoreEmpty: true
      - name: marker
        value: present
